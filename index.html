<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Personal Finance - @codingwnikco</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@300;400;500;700&family=IBM+Plex+Sans:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!--LOADING SCREEN-->
  <div id="loader">
    <div class="loader-bg-grid"></div>
    <div class="loader-inner">
      <div class="loader-logo">Finance - codingwnikco</div>
      <div class="loader-tagline">personal finance terminal</div>
      <div class="loader-bar-wrap">
        <div class="loader-bar" id="loaderBar"></div>
      </div>
      <div class="loader-status" id="loaderStatus">INITIALIZING...</div>
    </div>
    <div class="loader-corner tl">€€€</div>
    <div class="loader-corner tr">v1.0</div>
    <div class="loader-corner bl" id="loaderPct">0%</div>
    <div class="loader-corner br">SK</div>
  </div>

  <!-- ░░░ APP ░░░ -->
  <div id="app" class="hidden">

    <div class="scanline"></div>

    <nav class="topbar">
      <div class="topbar-logo">DASHBOARD - made by codingwnikco</div>
      <div class="topbar-meta">
        <span id="currentDate"></span>
        <span class="dot">·</span>
        <span id="txCount">0 TXN</span>
      </div>
    </nav>

    <main class="layout">

      <!-- LEFT COLUMN -->
      <aside class="sidebar">

        <div class="stat-block">
          <div class="stat-label">// ZOSTATOK</div>
          <div class="stat-value" id="balance">€0.00</div>
          <div class="stat-bar-bg"><div class="stat-bar-fill" id="balanceBar"></div></div>
        </div>

        <div class="stat-block income-block">
          <div class="stat-label">// PRÍJMY</div>
          <div class="stat-value green" id="totalIncome">€0.00</div>
        </div>

        <div class="stat-block expense-block">
          <div class="stat-label">// VÝDAVKY</div>
          <div class="stat-value red" id="totalExpense">€0.00</div>
        </div>

        <div class="divider"></div>

        <!-- ADD FORM -->
        <div class="form-section">
          <div class="form-label">// NOVÁ TRANSAKCIA</div>

          <div class="field">
            <label>POPIS</label>
            <input type="text" id="desc" placeholder="napr. Plat, Nákup..." autocomplete="off"/>
          </div>

          <div class="field">
            <label>SUMA €</label>
            <input type="number" id="amount" placeholder="0.00" min="0" step="0.01"/>
          </div>

          <div class="field">
            <label>TYP</label>
            <div class="type-toggle">
              <button class="type-btn active" id="typeIncome" data-type="income">↑ PRÍJEM</button>
              <button class="type-btn" id="typeExpense" data-type="expense">↓ VÝDAVOK</button>
            </div>
          </div>

          <div class="field" id="catField">
            <label>KATEGÓRIA</label>
            <select id="category">
              <option value="Plat">▸ PLAT</option>
              <option value="Ostatné príjmy">▸ OSTATNÉ PRÍJMY</option>
            </select>
          </div>

          <button class="btn-add" id="btnAdd">[ PRIDAŤ ]</button>
        </div>

        <div class="divider"></div>

        <!-- FILTERS -->
        <div class="filters">
          <div class="form-label">// FILTER</div>
          <button class="filter-btn active" data-filter="all">VŠETKY</button>
          <button class="filter-btn" data-filter="income">PRÍJMY</button>
          <button class="filter-btn" data-filter="expense">VÝDAVKY</button>
        </div>

      </aside>

      <!-- RIGHT COLUMN: TRANSACTIONS -->
      <section class="tx-section">
        <div class="tx-header">
          <span class="tx-header-title">TRANSAKCIE</span>
          <span class="tx-header-sub" id="listCount">—</span>
        </div>

        <div class="tx-scroll">
          <ul class="tx-list" id="txList">
            <li class="tx-empty">
              <span>ŽIADNE ZÁZNAMY</span>
              <small>Pridaj prvú transakciu vľavo.</small>
            </li>
          </ul>
        </div>
      </section>

    </main>

  </div>

  <script src="app.js"></script>
</body>
</html>
